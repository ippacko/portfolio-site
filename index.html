<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vicente Lagarrigue | Terminal Portfolio</title>
    <style>
        :root {
            --bg-0: #0a1114;
            --bg-1: #101a1f;
            --bg-2: #0f2622;
            --surface: #0d1418;
            --surface-2: #132026;
            --line: #223942;
            --text: #d8ece4;
            --muted: #87aca2;
            --prompt: #7ff2be;
            --accent: #7ec3ff;
            --warning: #ffd17e;
            --danger: #ff8a8a;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "IBM Plex Mono", "Fira Code", "Source Code Pro", Menlo, Consolas, monospace;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 15%, rgba(126, 195, 255, 0.2), transparent 36%),
                radial-gradient(circle at 85% 10%, rgba(127, 242, 190, 0.14), transparent 34%),
                radial-gradient(circle at 50% 85%, rgba(255, 209, 126, 0.1), transparent 38%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .shell {
            width: min(980px, 100%);
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            box-shadow: var(--shadow);
            animation: boot 650ms ease-out;
        }

        .shell-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(8, 15, 19, 0.7);
            padding: 10px 14px;
            backdrop-filter: blur(8px);
        }

        .traffic {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.red { background: #ff6d6d; }
        .dot.yellow { background: #ffcb63; }
        .dot.green { background: #5add98; }

        .title {
            color: var(--muted);
            font-size: 0.86rem;
            letter-spacing: 0.03em;
        }

        .shell-body {
            background: linear-gradient(180deg, rgba(8, 12, 14, 0.94), rgba(7, 11, 13, 0.98));
            min-height: 72vh;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .output {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            scroll-behavior: smooth;
        }

        .line {
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0 0 9px;
            opacity: 0;
            transform: translateY(6px);
            animation: reveal 280ms ease forwards;
        }

        .line.system { color: var(--muted); }
        .line.command { color: var(--prompt); }
        .line.error { color: var(--danger); }
        .line.warning { color: var(--warning); }

        .line a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 0.14em;
        }

        .line a:hover {
            color: #b5ddff;
        }

        .prompt-row {
            border-top: 1px solid var(--line);
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: center;
            padding: 14px 16px 16px;
            background: linear-gradient(180deg, var(--surface), var(--surface-2));
        }

        .prompt {
            color: var(--prompt);
            user-select: none;
        }

        #commandInput {
            appearance: none;
            border: 0;
            outline: none;
            border-radius: 0;
            background: transparent;
            color: var(--text);
            font: inherit;
            font-size: 1rem;
            width: 100%;
            caret-color: var(--prompt);
        }

        .hint {
            border-top: 1px dashed rgba(135, 172, 162, 0.32);
            color: var(--muted);
            font-size: 0.81rem;
            padding: 10px 16px;
            background: rgba(16, 30, 33, 0.55);
        }

        .cursor {
            display: inline-block;
            width: 0.55ch;
            height: 1.05em;
            background: var(--prompt);
            margin-left: 2px;
            vertical-align: -0.15em;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes boot {
            from {
                transform: translateY(18px) scale(0.987);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes blink {
            0%,
            50% { opacity: 1; }
            50.01%,
            100% { opacity: 0; }
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .shell { border-radius: 12px; }
            .shell-body { min-height: 76vh; max-height: 86vh; }
            .output { padding: 14px; }
            .prompt-row { padding: 12px 14px 14px; }
            .hint { font-size: 0.77rem; }
        }
    </style>
</head>
<body>
    <main class="shell" role="application" aria-label="Interactive terminal portfolio">
        <header class="shell-header">
            <div class="traffic" aria-hidden="true">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="title">vicente-portfolio.sh</div>
        </header>

        <section class="shell-body">
            <div class="output" id="output" aria-live="polite"></div>

            <label class="prompt-row" for="commandInput">
                <span class="prompt">visitor@portfolio:~$</span>
                <input id="commandInput" type="text" autocomplete="off" spellcheck="false" aria-label="Terminal command input">
            </label>

            <div class="hint">Type <strong>help</strong> and press Enter to begin.</div>
        </section>
    </main>

    <script>
        const output = document.getElementById("output");
        const input = document.getElementById("commandInput");

        const history = [];
        let historyIndex = -1;

        const profile = {
            name: "Vicente Lagarrigue",
            role: "Software Developer & Cryptographer",
            location: "Aspen, CO",
            bio: "I build clean, reliable systems with a focus on cryptography, applied ML, and practical engineering.",
            stack: ["Java", "SQL", "Python", "JavaScript", "C/C++", "C#", "Q#", "TensorFlow", "PyTorch", "Docker", "Spring Boot"],
            contact: {
                email: "mailto:vicentelagarrigue7@gmail.com",
                linkedin: "https://www.linkedin.com/in/vicente-lagarrigue/",
                github: "https://github.com/ippacko"
            },
            projects: [
                {
                    name: "Monocular Depth Estimation",
                    desc: "Trained CNN models for endoscopic imaging using TensorFlow.",
                    link: "https://github.com/ippacko/csci4800",
                    tags: ["AI/ML", "Python", "TensorFlow"]
                },
                {
                    name: "Hand Tracker",
                    desc: "Real-time hand-tracking vision pipeline with MediaPipe and OpenCV.",
                    link: "https://github.com/ippacko/Hand-Tracker",
                    tags: ["Python", "OpenCV", "MediaPipe"]
                },
                {
                    name: "PL/SQL Utilities",
                    desc: "Automated data-integrity checks and reporting workflows in Oracle.",
                    link: "https://github.com/ippacko",
                    tags: ["SQL", "Oracle", "Automation"]
                }
            ]
        };

        const aliases = {
            ls: "help",
            about: "info",
            work: "projects",
            project: "projects",
            cls: "clear"
        };

        function parseProjectIndex(args) {
            if (!args.length) {
                return null;
            }

            if (args[0] === "open" && args[1]) {
                return Number.parseInt(args[1], 10);
            }

            return Number.parseInt(args[0], 10);
        }

        function openProject(index) {
            const project = profile.projects[index - 1];

            if (!project) {
                print(`Project ${index} does not exist. Try 'projects' to list options.`, "error");
                return;
            }

            print(`Opening project ${index}: ${project.name}`, "system");
            printLink(`link: ${project.link}`, project.link);
            window.open(project.link, "_blank", "noopener,noreferrer");
        }

        const commands = {
            help: () => {
                print("Available commands:");
                print("  help      Show this command list");
                print("  intro     Show welcome text");
                print("  info      Basic profile information");
                print("  skills    Technical stack");
                print("  projects  List selected projects");
                print("  project N Open project number N");
                print("  projects open N Open project number N");
                print("  contact   Links to reach me");
                print("  resume    Quick one-line summary");
                print("  date      Current local time");
                print("  clear     Clear terminal output");
                print("  aliases   ls, about, work, project, cls", "system");
                print("  hidden    try sudo, matrix, coffee", "system");
            },
            intro: () => {
                print(`Welcome to ${profile.name}'s terminal portfolio.`);
                print("This site is intentionally command-driven.");
                print("Start with 'info' or 'projects'.", "system");
            },
            info: () => {
                print(`${profile.name}`);
                print(`${profile.role}`);
                print(`${profile.location}`);
                print(profile.bio);
            },
            skills: () => {
                print("Technical stack:");
                print(profile.stack.join(" | "));
            },
            projects: (args = []) => {
                const requestedIndex = parseProjectIndex(args);
                if (Number.isInteger(requestedIndex)) {
                    openProject(requestedIndex);
                    return;
                }

                print("Selected projects:");
                profile.projects.forEach((project, index) => {
                    print(`${index + 1}. ${project.name} - ${project.desc}`);
                    printLink(`   link: ${project.link}`, project.link);
                    print(`   tags: ${project.tags.join(", ")}`, "system");
                });
            },
            contact: () => {
                print("Contact:");
                printLink("  email    vicentelagarrigue7@gmail.com", profile.contact.email);
                printLink("  linkedin vicente-lagarrigue", profile.contact.linkedin);
                printLink("  github   ippacko", profile.contact.github);
            },
            resume: () => {
                print("Developer focused on dependable software, cryptography, and practical ML delivery.");
            },
            date: () => {
                print(new Date().toString());
            },
            clear: () => {
                output.innerHTML = "";
            },
            sudo: () => {
                print("Permission denied: nice try.", "warning");
            },
            matrix: () => {
                print("Wake up, Neo...", "system");
                print("01001000 01100101 01101100 01101100 01101111", "system");
                print("There is no spoon.", "system");
            },
            coffee: () => {
                print("Brewing a virtual espresso...", "system");
                print("Done. Productivity +12%", "system");
            }
        };

        function print(text, type = "") {
            const line = document.createElement("p");
            line.className = `line ${type}`.trim();
            line.textContent = text;
            output.appendChild(line);
            scrollOutput();
        }

        function printLink(text, href) {
            const line = document.createElement("p");
            line.className = "line";
            const anchor = document.createElement("a");
            anchor.href = href;
            anchor.target = "_blank";
            anchor.rel = "noopener noreferrer";
            anchor.textContent = text;
            line.appendChild(anchor);
            output.appendChild(line);
            scrollOutput();
        }

        function scrollOutput() {
            output.scrollTop = output.scrollHeight;
        }

        function runCommand(raw) {
            const trimmed = raw.trim();
            print(`visitor@portfolio:~$ ${raw}`, "command");

            if (!trimmed) {
                return;
            }

            const [name, ...args] = trimmed.split(/\s+/);
            const lowered = name.toLowerCase();
            const command = aliases[lowered] || lowered;

            if (commands[command]) {
                commands[command](args);
                return;
            }

            print(`Command not found: ${command}`, "error");
            print("Type 'help' to see available commands.", "warning");
        }

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                const raw = input.value;
                if (raw.trim()) {
                    history.push(raw);
                }
                historyIndex = history.length;
                runCommand(raw);
                input.value = "";
            }

            if (event.key === "ArrowUp") {
                event.preventDefault();
                if (!history.length) {
                    return;
                }
                historyIndex = Math.max(0, historyIndex - 1);
                input.value = history[historyIndex] || "";
            }

            if (event.key === "ArrowDown") {
                event.preventDefault();
                if (!history.length) {
                    return;
                }
                historyIndex = Math.min(history.length, historyIndex + 1);
                input.value = history[historyIndex] || "";
            }
        });

        document.addEventListener("click", () => input.focus());

        print("Boot sequence complete.", "system");
        print("Type 'help' to list commands.", "system");
        print("", "system");
        commands.intro();
        input.focus();
    </script>
</body>
</html>
